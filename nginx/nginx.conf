events {}

http {
    server {
        listen 80;
        server_name klsbank.store;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name klsbank.store;

        ssl_certificate /etc/letsencrypt/live/klsbank.store/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/klsbank.store/privkey.pem;

        location / {
            proxy_pass http://spring-boot:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}