<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FX BANK - 회원가입</title>
</head>
<body>

    <h2>부산은행 외환 시스템 회원가입</h2>
    
    <form id="registerForm">
        <div>
            <label>아이디</label>
            <input type="text" id="userId" placeholder="아이디 입력" required>
            <button type="button" onclick="checkDuplicateId()">중복 확인</button>
        </div>

        <div>
            <label>비밀번호</label>
            <input type="password" id="secuPw" placeholder="비밀번호 입력" required>
        </div>

        <div>
            <label>한글 성명</label>
            <input type="text" id="nameKo" required>
        </div>

        <div>
            <label>영문 성명</label>
            <input type="text" id="nameEn" placeholder="HONG GILDONG">
        </div>

        <div>
            <label>주민등록번호</label>
            <input type="text" id="rrn" placeholder="901122-1111111" required>
        </div>

        <div>
            <label>휴대폰 번호</label>
            <input type="text" id="phone" placeholder="010-1234-5678" required>
        </div>

        <div>
            <label>이메일 주소</label>
            <input type="email" id="email" placeholder="hong@example.com" required>
        </div>

        <div>
            <label>성별</label>
            <select id="gender" required>
                <option value="">-- 선택 --</option>
                <option value="MALE">남성 (MALE)</option>
                <option value="FEMALE">여성 (FEMALE)</option>
            </select>
        </div>

        <div>
            <label>투자 성향</label>
            <input type="text" id="userTendency" placeholder="예: 적극적 참여형">
        </div>

        <div>
            <label>자택 주소</label>
            <button type="button" onclick="executeDaumPostcode()">우편번호 검색</button>
            
            <div>
                <p>[국문 주소]</p>
                <input type="text" id="postcode" placeholder="우편번호" readonly>
                <input type="text" id="address" placeholder="기본 한글 주소" readonly>
                <input type="text" id="address_detail" placeholder="상세 주소 입력">
            </div>

            <div style="margin-top: 10px;">
                <p>[영문 주소]</p>
                <input type="text" id="postcode_en" placeholder="Zip Code" readonly>
                <input type="text" id="address_en" placeholder="English Street Address" readonly>
                <input type="text" id="address_detail_en" placeholder="English Detail Address">
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit">회원가입 완료</button>
        </div>
    </form>

<script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    // 중복 체크 상태 통제 변수
    let isIdChecked = false;
    let checkedUserId = "";

    /**
     * 기능 ①: 카카오 우편번호 검색 (한글/영문 동시 매핑)
     */
    function executeDaumPostcode() {
        new kakao.Postcode({
            oncomplete: function(data) {
                var addr = ''; 
                var extraAddr = ''; 

                if (data.userSelectedType === 'R') { 
                    addr = data.roadAddress;
                } else { 
                    addr = data.jibunAddress;
                }

                if (data.userSelectedType === 'R') {
                    if (data.bname !== '' && /[동로가]$/.test(data.bname)) {
                        extraAddr += data.bname;
                    }
                    if (data.buildingName !== '' && data.apartment === 'Y') {
                        extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                    }
                    if (extraAddr !== '') {
                        extraAddr = ' (' + extraAddr + ')';
                    }
                }

                // 한글 주소 input에 바인딩
                document.getElementById('postcode').value = data.zonecode;
                document.getElementById("address").value = addr + extraAddr;
                
                // 영문 주소 input에 바인딩 (추가 호출 없이 한 번에 처리)
                document.getElementById('postcode_en').value = data.zonecode;
                document.getElementById("address_en").value = data.roadAddressEnglish;

                // 상세주소 칸으로 포커스 이동
                document.getElementById("address_detail").focus();
            }
        }).open();
    }

    /**
     * 기능 ②: 백엔드 오라클 DB 연동 - 아이디 중복 확인
     */
    function checkDuplicateId() {
        const userIdInput = document.getElementById("userId").value.trim();
        
        if (!userIdInput) {
            alert("아이디를 입력해 주세요.");
            return;
        }

        fetch(`/api/auth/check-id?userId=${encodeURIComponent(userIdInput)}`)
            .then(response => response.json())
            .then(res => {
                if (res.success) {
                    if (res.data === true) {
                        alert(res.message); // 이미 사용 중인 아이디
                        isIdChecked = false;
                    } else {
                        alert(res.message); // 사용 가능한 아이디
                        isIdChecked = true;
                        checkedUserId = userIdInput; // 검증 성공 아이디 박제
                    }
                } else {
                    alert("검증 실패: " + res.message);
                }
            })
            .catch(err => alert("통신 오류: " + err));
    }

    /**
     * 기능 ③: 회원가입 데이터 패키징 후 POST 전송
     */
    document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const currentUserId = document.getElementById("userId").value.trim();

        // 아이디 꼼수 가드 조치
        if (!isIdChecked || checkedUserId !== currentUserId) {
            alert("아이디 중복 확인이 필요합니다.");
            return;
        }

        // 백엔드 RegisterRequestDto 변수명과 일치시킴
        const payload = {
            userId: currentUserId,
            secuPw: document.getElementById("secuPw").value,
            nameKo: document.getElementById("nameKo").value,
            nameEn: document.getElementById("nameEn").value,
            rrn: document.getElementById("rrn").value,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value,
            addrKo: document.getElementById("address").value,
            addrDetailKo: document.getElementById("address_detail").value,
            zipCodeKo: document.getElementById("postcode").value,
            addrEn: document.getElementById("address_en").value,
            addrDetailEn: document.getElementById("address_detail_en").value,
            zipCodeEn: document.getElementById("postcode_en").value,
            gender: document.getElementById("gender").value,
            userTendency: document.getElementById("userTendency").value
        };

        fetch("/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(res => {
            if (res.success) {
                alert(res.message);
                location.href = "/login"; // 성공 후 로그인 화면 이동
            } else {
            	console.log(res.message)
                alert("가입 실패: " + res.message);
            }
        })
        .catch(err => alert("전송 에러: " + err));
    });
</script>

</body>
</html>
