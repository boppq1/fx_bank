<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLS 이벤트</title>
    <link rel="stylesheet" th:href="@{/css/fx-home.css}">
    <link rel="stylesheet" th:href="@{/css/event.css}">
</head>
<body>

<div th:replace="~{header :: header}"></div>

<section class="ev-hero">
    <span class="ev-blob ev-blob-1" aria-hidden="true"></span>
    <span class="ev-blob ev-blob-2" aria-hidden="true"></span>
    <div class="ev-hero-inner">
        <span class="ev-badge" data-reveal><span class="live-dot" aria-hidden="true"></span> 진행중 이벤트</span>
        <h1 class="ev-title" data-reveal>KLS 글자를 찾아라!</h1>
        <p class="ev-desc" data-reveal>일상 속에서 <b>B · N · K</b> 글자를 찾아 인증하면<br><strong>우대금리 쿠폰</strong>을 드려요.</p>
    </div>
</section>

<main class="ev-wrap">
    <div class="ev-steps" data-stagger="120">
        <article class="ev-card ev-card-b lift" data-reveal>
            <span class="ev-letter">B</span>
            <h3>B 글자 찾기</h3>
            <p>주변에서 B를 발견하면<br>카메라로 인증하세요</p>
        </article>
        <article class="ev-card ev-card-n lift" data-reveal>
            <span class="ev-letter">N</span>
            <h3>N 글자 찾기</h3>
            <p>주변에서 N을 발견하면<br>카메라로 인증하세요</p>
        </article>
        <article class="ev-card ev-card-k lift" data-reveal>
            <span class="ev-letter">K</span>
            <h3>K 글자 찾기</h3>
            <p>주변에서 K를 발견하면<br>카메라로 인증하세요</p>
        </article>
    </div>

    <div class="ev-cta" data-reveal>
        <!-- 앱일 때만 참여 버튼 노출 (joinEvent / id 유지) -->
        <div th:if="${isApp}">
            <button id="joinBtn" class="ev-join press" data-ripple onclick="joinEvent()">이벤트 참여하기</button>
        </div>
        <div th:unless="${isApp}" class="ev-appl-note">
            <i class="bi bi-phone" aria-hidden="true"></i> 이벤트 참여는 앱에서만 가능합니다.
        </div>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script th:src="@{/js/event.js(v=2026063001)}"></script>
</body>
</html>
