<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환율조회 | KLS은행</title>
<link rel="stylesheet" th:href="@{/css/fx-home.css}">
<link rel="stylesheet" th:href="@{/css/fx-guide.css}">

<style>
    .fx-rate-mobile-list { display: none; }
    @media (max-width: 680px) {
        .guide-rate-head { align-items: flex-start; }
        .guide-rate-count { flex: 0 0 auto; padding: 6px 10px; border-radius: 999px; background: #F1EEFF; color: var(--violet); font-weight: 900; }
        .guide-toolbar { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 14px; }
        .guide-toolbar .guide-select,
        .guide-toolbar .guide-search-input { max-width: none !important; width: 100%; height: 48px; border-radius: 16px; }
        .guide-search-input { font-size: 13.5px; }
        .guide-table-wrap { display: none; }
        .fx-rate-mobile-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .fx-rate-card {
            position: relative; overflow: hidden; padding: 17px 16px 15px;
            border: 1px solid var(--border); border-radius: 20px; background: #fff;
            box-shadow: var(--shadow-sm);
        }
        .fx-rate-card::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: var(--grad-cta);
        }
        .fx-rate-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .fx-rate-currency { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .fx-rate-symbol {
            flex: 0 0 auto; width: 38px; height: 38px; border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            background: #F1EEFF; color: var(--violet); font-size: 12px; font-weight: 900;
        }
        .fx-rate-name { display: block; color: var(--text); font-size: 15px; font-weight: 900; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fx-rate-code { display: block; margin-top: 2px; color: var(--text-sub); font-size: 12px; font-weight: 800; }
        .fx-rate-date { flex: 0 0 auto; color: var(--text-sub); font-size: 11.5px; font-weight: 800; }
        .fx-rate-base { padding: 13px 14px; border-radius: 16px; background: linear-gradient(135deg,#F4F1FF,#FFFFFF); border: 1px solid rgba(109,91,255,.14); }
        .fx-rate-base span { display: block; color: var(--text-sub); font-size: 11.5px; font-weight: 900; }
        .fx-rate-base strong { display: block; margin-top: 4px; color: var(--text); font-size: 24px; font-weight: 900; letter-spacing: 0; font-variant-numeric: tabular-nums; }
        .fx-rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 10px; }
        .fx-rate-mini { padding: 12px; border-radius: 15px; background: var(--bg); border: 1px solid var(--border); }
        .fx-rate-mini span { display: block; margin-bottom: 4px; color: var(--text-sub); font-size: 11.5px; font-weight: 900; }
        .fx-rate-mini strong { color: var(--text); font-size: 15px; font-weight: 900; font-variant-numeric: tabular-nums; }
        .fx-rate-empty { padding: 28px 18px; border: 1px dashed var(--border); border-radius: 20px; background: #fff; color: var(--text-sub); text-align: center; font-size: 13.5px; font-weight: 800; }
        .guide-pager { gap: 5px; margin-top: 16px; }
        .guide-page { min-width: 32px; height: 32px; border-radius: 11px; font-size: 12.5px; }
        .guide-foot-note { margin-top: 16px; font-size: 11.5px; }
    }
</style>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<section class="guide-hero">
    <div class="guide-hero-inner">
        <span class="guide-hero-badge">환율 정보</span>
        <h1 class="guide-hero-title">환율조회</h1>
        <p class="guide-hero-desc">통화별 고시환율을 기간 전체로 조회하세요. 통화를 선택하거나 국가·통화명으로 검색할 수 있습니다.</p>
    </div>
</section>

<main class="guide-wrap">
    <div class="guide-section">
        <div class="guide-rate-head">
            <h2 class="guide-section-title">고시환율 조회</h2>
            <span class="guide-rate-count">총 <strong id="fxCount">0</strong>건</span>
        </div>

        <div class="guide-toolbar">
            <select id="fxCurSelect" class="guide-select" style="max-width:240px">
                <option value="">전체 통화</option>
            </select>
            <input type="text" id="fxRateSearch" class="guide-search-input" placeholder="국가·통화명 또는 코드 검색 (예: 미국, 달러, USD)">
        </div>

        <div id="fxRateCards" class="fx-rate-mobile-list" aria-live="polite"></div>

        <div class="guide-table-wrap">
            <table class="guide-table guide-rate-table">
                <thead>
                    <tr>
                        <th>통화</th>
                        <th>매매기준율</th>
                        <th>살 때 (고객)</th>
                        <th>팔 때 (고객)</th>
                        <th>고시일</th>
                    </tr>
                </thead>
                <tbody id="fxRateBody">
                    <tr><td colspan="5" style="text-align:center;color:var(--text-sub)">불러오는 중…</td></tr>
                </tbody>
            </table>
        </div>

        <div class="guide-pager" id="fxPager"></div>

        <p class="guide-foot-note">
            * 한국수출입은행 고시 전신환 매매율 기준이며, 실제 거래 환율은 영업점·거래 시점에 따라 다를 수 있습니다.<br>
            * 한 페이지에 20건씩 표시되며, 통화를 선택하거나 검색하면 해당 통화의 전체 기간이 페이지로 나뉘어 표시됩니다.
        </p>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script th:src="@{/js/fx-currency.js}"></script>
<script th:src="@{/js/fx-rate.js}"></script>
</body>
</html>
