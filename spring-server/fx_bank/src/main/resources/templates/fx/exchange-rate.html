<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환율조회 | KLS은행</title>
<link rel="stylesheet" th:href="@{/css/fx-home.css}">
<link rel="stylesheet" th:href="@{/css/fx-guide.css}">
</head>
<body>

<div th:replace="~{header :: header}"></div>

<section class="guide-hero">
    <div class="guide-hero-inner">
        <span class="guide-hero-badge">환율 정보</span>
        <h1 class="guide-hero-title">환율조회</h1>
        <p class="guide-hero-desc">통화별 고시환율을 기간 전체로 조회하세요. 통화를 선택하거나 국가·통화명으로 검색할 수 있습니다.</p>
    </div>
</section>

<main class="guide-wrap">
    <div class="guide-section">
        <div class="guide-rate-head">
            <h2 class="guide-section-title">고시환율 조회</h2>
            <span class="guide-rate-count">총 <strong id="fxCount">0</strong>건</span>
        </div>

        <div class="guide-toolbar">
            <select id="fxCurSelect" class="guide-select" style="max-width:240px">
                <option value="">전체 통화</option>
            </select>
            <input type="text" id="fxRateSearch" class="guide-search-input" placeholder="국가·통화명 또는 코드 검색 (예: 미국, 달러, USD)">
        </div>

        <div class="guide-table-wrap">
            <table class="guide-table guide-rate-table">
                <thead>
                    <tr>
                        <th>통화</th>
                        <th>매매기준율</th>
                        <th>살 때 (고객)</th>
                        <th>팔 때 (고객)</th>
                        <th>고시일</th>
                    </tr>
                </thead>
                <tbody id="fxRateBody">
                    <tr><td colspan="5" style="text-align:center;color:var(--text-sub)">불러오는 중…</td></tr>
                </tbody>
            </table>
        </div>

        <div class="guide-pager" id="fxPager"></div>

        <p class="guide-foot-note">
            * 한국수출입은행 고시 전신환 매매율 기준이며, 실제 거래 환율은 영업점·거래 시점에 따라 다를 수 있습니다.<br>
            * 한 페이지에 20건씩 표시되며, 통화를 선택하거나 검색하면 해당 통화의 전체 기간이 페이지로 나뉘어 표시됩니다.
        </p>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script th:src="@{/js/fx-currency.js}"></script>
<script th:src="@{/js/fx-rate.js}"></script>
</body>
</html>
