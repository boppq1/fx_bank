<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환전계산기 | KLS은행</title>
<link rel="stylesheet" th:href="@{/css/fx-home.css}">
<link rel="stylesheet" th:href="@{/css/fx-guide.css}">
</head>
<body>

<div th:replace="~{header :: header}"></div>

<section class="guide-hero">
    <div class="guide-hero-inner">
        <span class="guide-hero-badge">환전 계산</span>
        <h1 class="guide-hero-title">환전계산기</h1>
        <p class="guide-hero-desc">통화·금액·우대율을 입력하면 적용환율과 예상 환전 금액을 바로 계산해 드립니다.</p>
    </div>
</section>

<main class="guide-wrap">
    <div class="guide-calc-grid">

        <!-- 입력 -->
        <div class="guide-section calc-form">
            <h2 class="guide-section-title">환전 정보 입력</h2>

            <div class="guide-field full">
                <label class="guide-label" for="calcCurrency">통화 선택</label>
                <select id="calcCurrency" class="guide-select"></select>
            </div>

            <div class="guide-field full">
                <label class="guide-label">거래 구분</label>
                <div class="guide-seg" id="calcSeg">
                    <button type="button" class="seg-btn is-active" data-bs="buy">살 때 (외화 구매)</button>
                    <button type="button" class="seg-btn" data-bs="sell">팔 때 (외화 판매)</button>
                </div>
            </div>

            <div class="guide-field full">
                <label class="guide-label" for="calcAmount">금액 (외화)</label>
                <div class="guide-amount">
                    <input type="text" id="calcAmount" inputmode="decimal" placeholder="1,000" value="1,000">
                    <span class="guide-amount-unit" id="calcAmountUnit">USD</span>
                </div>
                <div class="guide-chip-row" id="amountChips">
                    <button type="button" class="guide-chip" data-v="100">100</button>
                    <button type="button" class="guide-chip" data-v="500">500</button>
                    <button type="button" class="guide-chip" data-v="1000">1,000</button>
                    <button type="button" class="guide-chip" data-v="5000">5,000</button>
                    <button type="button" class="guide-chip" data-v="10000">10,000</button>
                </div>
            </div>

            <div class="guide-field full">
                <label class="guide-label" for="calcPrefer">환율 우대율</label>
                <div class="guide-amount">
                    <input type="number" id="calcPrefer" min="0" max="90" step="5" value="0">
                    <span class="guide-amount-unit">%</span>
                </div>
                <div class="guide-chip-row" id="preferChips">
                    <button type="button" class="guide-chip" data-v="0">0%</button>
                    <button type="button" class="guide-chip" data-v="30">30%</button>
                    <button type="button" class="guide-chip" data-v="50">50%</button>
                    <button type="button" class="guide-chip" data-v="70">70%</button>
                    <button type="button" class="guide-chip" data-v="90">90%</button>
                </div>
            </div>

            <div class="guide-field full">
                <label class="guide-label" for="calcDate">기준일 <span style="font-weight:400;color:var(--text-sub)">(미입력 시 최신)</span></label>
                <input type="date" id="calcDate" class="guide-input">
            </div>

            <button type="button" id="calcBtn" class="btn btn-primary btn-block">환전 금액 계산</button>
        </div>

        <!-- 결과 -->
        <div class="guide-section calc-result-panel">
            <h2 class="guide-section-title">계산 결과</h2>

            <div class="calc-hero">
                <p class="calc-hero-label"><span id="rDir">외화 살 때</span> · <span id="rCur" class="notranslate">USD</span></p>
                <p class="calc-hero-value"><span id="rKrw">–</span></p>
                <p class="calc-hero-sub" id="rInput">통화·금액을 입력하고 계산하세요</p>
            </div>

            <div class="calc-breakdown">
                <div class="calc-bd"><span>적용환율 (우대 후)</span><strong id="rApplied">–</strong></div>
                <div class="calc-bd"><span>고시환율 (우대 전)</span><strong id="rNotice">–</strong></div>
                <div class="calc-bd"><span>매매기준율</span><strong id="rBase">–</strong></div>
                <div class="calc-bd"><span>스프레드</span><strong id="rSpread">–</strong></div>
                <div class="calc-bd calc-bd-accent"><span>우대 절감액</span><strong id="rSaved">–</strong></div>
                <div class="calc-bd"><span>기준 고시일</span><strong id="rDate">–</strong></div>
            </div>

            <p class="guide-foot-note">
                * 한국수출입은행 고시환율 기준 참고용이며, 실제 환전 금액·수수료는 거래 시점·영업점에 따라 달라질 수 있습니다.<br>
                * 살 때는 매도율(고객이 외화를 사는 환율), 팔 때는 매수율(고객이 외화를 파는 환율)을 적용합니다.
            </p>
        </div>

    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script th:src="@{/js/fx-currency.js}"></script>
<script th:src="@{/js/fx-calc.js}"></script>
</body>
</html>
