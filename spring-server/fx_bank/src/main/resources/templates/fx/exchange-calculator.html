<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환전계산기 | BNK 부산은행</title>
<link rel="stylesheet" th:href="@{/css/fx-home.css}">
<link rel="stylesheet" th:href="@{/css/fx-guide.css}">
</head>
<body>

<div th:replace="~{header :: header}"></div>

<section class="guide-hero">
    <div class="guide-hero-inner">
        <span class="guide-hero-badge">환전 계산</span>
        <h1 class="guide-hero-title">환전계산기</h1>
        <p class="guide-hero-desc">통화·금액·우대율을 입력하면 적용환율과 예상 환전 금액을 바로 계산해 드립니다.</p>
    </div>
</section>

<main class="guide-wrap">
    <div class="guide-section">
        <h2 class="guide-section-title">환전 금액 계산</h2>

        <div class="guide-form">
            <div class="guide-field">
                <label class="guide-label" for="calcCurrency">통화</label>
                <select id="calcCurrency" class="guide-select"></select>
            </div>

            <div class="guide-field">
                <label class="guide-label">구분</label>
                <div class="guide-radio-group">
                    <label class="guide-radio">
                        <input type="radio" name="calcBuySell" value="buy" checked>
                        <span>살 때</span>
                    </label>
                    <label class="guide-radio">
                        <input type="radio" name="calcBuySell" value="sell">
                        <span>팔 때</span>
                    </label>
                </div>
            </div>

            <div class="guide-field">
                <label class="guide-label" for="calcAmount">금액 (외화)</label>
                <input type="text" id="calcAmount" class="guide-input" inputmode="decimal" placeholder="예: 1,000" value="1,000">
            </div>

            <div class="guide-field">
                <label class="guide-label" for="calcPrefer">환율 우대율 (%)</label>
                <input type="number" id="calcPrefer" class="guide-input" min="0" max="90" step="10" value="0">
            </div>

            <div class="guide-field">
                <label class="guide-label" for="calcDate">기준일 <span style="font-weight:400;color:var(--text-sub)">(미입력 시 최신)</span></label>
                <input type="date" id="calcDate" class="guide-input">
            </div>

            <div class="guide-field" style="justify-content:flex-end;">
                <div class="guide-actions">
                    <button type="button" id="calcBtn" class="btn btn-primary btn-block">계산하기</button>
                </div>
            </div>
        </div>

        <!-- 결과 -->
        <div id="calcResult" class="guide-result" hidden>
            <div class="guide-result-big">
                <p class="label"><span id="rDir">외화 살 때</span> · <span id="rCur">USD</span></p>
                <p class="value"><span id="rKrw">-</span></p>
            </div>
            <div class="guide-result-grid">
                <div class="guide-result-item"><p class="label">적용환율 (우대 후)</p><p class="value" id="rApplied">-</p></div>
                <div class="guide-result-item"><p class="label">고시환율 (우대 전)</p><p class="value" id="rNotice">-</p></div>
                <div class="guide-result-item"><p class="label">매매기준율</p><p class="value" id="rBase">-</p></div>
                <div class="guide-result-item"><p class="label">스프레드</p><p class="value" id="rSpread">-</p></div>
                <div class="guide-result-item"><p class="label">우대 절감액</p><p class="value" id="rSaved">-</p></div>
                <div class="guide-result-item"><p class="label">기준 고시시각</p><p class="value" id="rDate">-</p></div>
            </div>
            <p class="guide-foot-note">
                * 예상 금액은 한국수출입은행 고시환율 기준 참고용이며, 실제 환전 금액·수수료는 거래 시점·영업점에 따라 달라질 수 있습니다.<br>
                * 살 때는 매도율(고객이 외화를 사는 환율), 팔 때는 매수율(고객이 외화를 파는 환율)을 적용합니다.
            </p>
        </div>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script th:src="@{/js/fx-calc.js}"></script>
</body>
</html>
