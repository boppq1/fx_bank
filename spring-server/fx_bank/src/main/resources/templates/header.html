<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>header</title>
<link rel="stylesheet" th:href="@{/css/fx-home.css}">
</head>
<body>
<header th:fragment="header" class="site-header">

  <!-- 아이콘 폰트: Bootstrap Icons (link 로드) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- 프리미엄 모션 시스템 (전 페이지 공용: 토큰·유틸 CSS + 엔진 JS). JS는 동기 로드로 html.motion 을 먼저 부여(FOUC 최소화) -->
  <link rel="stylesheet" th:href="@{/css/motion.css}">
  <script th:src="@{/js/motion.js}"></script>

  <!-- 구글 번역 위젯 (숨김) + 다국어 드롭다운 스타일 -->
  <style>
    #google_translate_element{display:none !important;}
    .goog-te-banner-frame,.skiptranslate{display:none !important;}
    body{top:0 !important;position:static !important;}
    .lang-select{position:relative;}
    .util-lang{display:inline-flex;align-items:center;gap:4px;background:none;border:0;cursor:pointer;
      font:inherit;font-size:12.5px;font-weight:700;color:#6D5BFF;padding:0;}
    .lang-menu{position:absolute;top:26px;right:0;min-width:122px;background:#fff;
      border:1px solid #ECEAF6;border-radius:10px;box-shadow:0 8px 24px rgba(109,91,255,.16);
      padding:6px;display:none;z-index:300;}
    .lang-menu.open{display:block;}
    .lang-menu button{display:block;width:100%;text-align:left;background:none;border:0;cursor:pointer;
      font:inherit;font-size:13px;color:#1A1A2E;padding:8px 10px;border-radius:7px;}
    .lang-menu button:hover{background:#F2F0FB;color:#6D5BFF;}
      .mobile-bottom-nav{display:none;}
    @media (max-width:680px){
      body{padding-bottom:84px;}
      .site-header .util-bar,
      .site-header .gnb,
      .site-header .gnb-tools{display:none;}
      .site-header .gnb-bar{
        display:block;position:sticky;top:0;z-index:460;
        background:rgba(255,255,255,.94);border-bottom:1px solid rgba(236,234,246,.95);
        -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
      }
      .site-header .gnb-inner{
        height:56px;min-height:56px;padding:0 18px;justify-content:center;
      }
      .site-header .brand{display:inline-flex;align-items:center;gap:8px;}
      .site-header .brand-name{font-size:17px;font-weight:900;color:#4F46E5;}
      .mobile-bottom-nav{
        position:fixed;left:12px;right:12px;bottom:10px;z-index:500;
        display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:4px;
        padding:8px 8px calc(8px + env(safe-area-inset-bottom));
        border:1px solid rgba(230,224,255,.95);border-radius:22px;
        background:rgba(255,255,255,.94);box-shadow:0 16px 42px rgba(26,26,46,.18);
        -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
      }
      .mobile-bottom-nav a{
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
        min-width:0;min-height:46px;border-radius:16px;text-decoration:none;
        color:#6B687C;font-size:11px;font-weight:800;line-height:1;white-space:nowrap;
      }
      .mobile-bottom-nav i{font-size:19px;line-height:1;color:inherit;}
      .mobile-bottom-nav a.is-active{background:#F1EEFF;color:#6D5BFF;}
      .mobile-bottom-nav a:active{transform:scale(.98);}
    }
  </style>

  <!-- 상단 유틸리티 바 -->
  <div class="util-bar">
    <div class="util-inner">
      <ul class="util-left">
        <li><a th:href="@{/fx/guide}">외환 안내</a></li>
      </ul>
      <ul class="util-right">
        <li class="lang-select">
          <button type="button" class="util-lang notranslate" id="langBtn"><i class="bi bi-translate" aria-hidden="true"></i> <span id="langCur">한국어</span> ▾</button>
          <div class="lang-menu notranslate" id="langMenu">
            <button type="button" data-lang="ko">한국어</button>
            <button type="button" data-lang="en">English</button>
            <button type="button" data-lang="ja">日本語</button>
            <button type="button" data-lang="zh-CN">中文</button>
          </div>
        </li>
        <!-- 비로그인 상태 -->
        <li class="auth-guest"><a th:href="@{/login}">로그인</a></li>
        <li class="auth-guest"><a th:href="@{/register}">회원가입</a></li>
        <!-- 로그인 상태 (기본 숨김, JS 가 토글) -->
        <li class="auth-user" hidden><span id="userGreeting" class="util-greeting"></span></li>
        <li class="auth-user" hidden><a href="#" id="logoutLink">로그아웃</a></li>
      </ul>
    </div>
  </div>

  <!-- 메인 GNB -->
  <div class="gnb-bar">
    <div class="gnb-inner">

      <a href="/" class="brand">
        <span class="brand-name">KLS은행</span>
      </a>

      <nav class="gnb">
        <ul class="gnb-menu">

          <li class="gnb-item">
            <a th:href="@{/product/list}" class="gnb-link">외환상품</a>
            <div class="gnb-dropdown">
              <a th:href="@{/product/list(type='DEPOSIT')}">외화예금</a>
              <a th:href="@{/product/list(type='SAVINGS')}">외화적금</a>
              <a th:href="@{/fx/guide}">외환 상품·서비스 안내</a>
            </div>
          </li>

          <li class="gnb-item">
            <a th:href="@{/fx/exchange-rate}" class="gnb-link">환율·환전</a>
            <div class="gnb-dropdown">
              <a th:href="@{/fx/exchange-rate}">환율조회</a>
              <a th:href="@{/fx/exchange-calculator}">환전계산기</a>
            </div>
          </li>

          <li class="gnb-item">
            <a href="#" class="gnb-link">고객지원</a>
            <div class="gnb-dropdown">
              <a href="/fx/guide#faq">FAQ</a>
              <a href="#">챗봇 상담</a>
            </div>
          </li>

          <li class="gnb-item">
            <a th:href="@{/event}" class="gnb-link">이벤트</a>
          </li>

        </ul>
      </nav>

      <div class="gnb-tools">
        <div class="gnb-search">
          <span class="gnb-search-ico"><i class="bi bi-search" aria-hidden="true"></i></span>
          <input type="text" placeholder="상품 검색...">
        </div>
        <a th:href="@{/login}" class="gnb-login auth-guest">로그인</a>
        <button type="button" class="gnb-login auth-user" id="gnbLogout" hidden>로그아웃</button>
      </div>

    </div>
  </div>

  <!-- 로그인 상태에 따라 헤더 표시 토글 + 사용자 이름 인사 -->
  <!-- auth-refresh.js 를 먼저 로드해 공용 single-flight 토큰 재발급 함수를 전 페이지에 제공 -->

  <nav class="mobile-bottom-nav" aria-label="&#47784;&#48148;&#51068; &#51452;&#50836; &#47700;&#45684;">
    <a th:href="@{/}" data-nav-match="/">
      <i class="bi bi-house-door" aria-hidden="true"></i>
      <span>&#54856;</span>
    </a>
    <a th:href="@{/product/list}" data-nav-match="/product">
      <i class="bi bi-grid" aria-hidden="true"></i>
      <span>&#49345;&#54408;</span>
    </a>
    <a th:href="@{/fx/exchange-rate}" data-nav-match="/fx">
      <i class="bi bi-currency-exchange" aria-hidden="true"></i>
      <span>&#54872;&#50984;</span>
    </a>
    <a th:href="@{/event}" data-nav-match="/event">
      <i class="bi bi-gift" aria-hidden="true"></i>
      <span>&#51060;&#48292;&#53944;</span>
    </a>
    <a th:href="@{/product/my-subscriptions}" data-nav-match="/product/my-subscriptions">
      <i class="bi bi-person-circle" aria-hidden="true"></i>
      <span>MY</span>
    </a>
  </nav>
  <script th:src="@{/js/auth-refresh.js}"></script>
  <script th:src="@{/js/header-auth.js}"></script>

  <!-- 다국어(구글 번역) -->
  <div id="google_translate_element" class="notranslate"></div>
  <script th:inline="none">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'ko', includedLanguages: 'en,ja,zh-CN', autoDisplay: false },
        'google_translate_element');
    }
    (function () {
      var LABEL = { ko: '한국어', en: 'English', ja: '日本語', 'zh-CN': '中文' };
      function getCookie(n) {
        var m = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
        return m ? m.pop() : '';
      }
      function applyLabel() {
        var g = getCookie('googtrans'), cur = 'ko';
        if (g) { var p = g.split('/'); if (p.length >= 3 && p[2]) cur = p[2]; }
        var el = document.getElementById('langCur');
        if (el) el.textContent = LABEL[cur] || '한국어';
      }
      function setLang(lang) {
        if (lang === 'ko') {
          document.cookie = 'googtrans=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
          document.cookie = 'googtrans=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;domain=' + location.hostname;
          location.reload();
          return;
        }
        var tries = 0;
        (function trySet() {
          var combo = document.querySelector('.goog-te-combo');
          if (combo) {
            combo.value = lang;
            combo.dispatchEvent(new Event('change'));
            var cur = document.getElementById('langCur');
            if (cur) cur.textContent = LABEL[lang] || lang;
          } else if (tries++ < 20) {
            setTimeout(trySet, 200);   // 위젯 로드 대기
          } else {
            document.cookie = 'googtrans=/ko/' + lang + ';path=/';
            location.reload();
          }
        })();
      }
      document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.mobile-bottom-nav a[data-nav-match]').forEach(function (link) {
          var match = link.getAttribute('data-nav-match');
          var path = location.pathname || '/';
          if ((match === '/' && path === '/') || (match !== '/' && path.indexOf(match) === 0)) {
            link.classList.add('is-active');
          }
        });

        applyLabel();
        var btn = document.getElementById('langBtn'), menu = document.getElementById('langMenu');
        if (btn && menu) {
          btn.addEventListener('click', function (e) { e.stopPropagation(); menu.classList.toggle('open'); });
          menu.addEventListener('click', function (e) {
            var b = e.target.closest('button[data-lang]');
            if (b) { setLang(b.getAttribute('data-lang')); menu.classList.remove('open'); }
          });
          document.addEventListener('click', function () { menu.classList.remove('open'); });
        }
        // 모바일: 하위메뉴 있는 상위 항목은 탭하면 아코디언으로 펼침/접힘 (데스크톱은 기존 hover/이동 유지)
        var gnbMq = window.matchMedia('(max-width: 680px)');
        document.querySelectorAll('.site-header .gnb-item').forEach(function (item) {
          var link = item.querySelector('.gnb-link');
          if (item.querySelector('.gnb-dropdown')) item.classList.add('has-sub');
          if (!link || !item.classList.contains('has-sub')) return;   // 하위 없는 '이벤트'는 그냥 이동
          link.addEventListener('click', function (e) {
            if (!gnbMq.matches) return;        // 데스크톱: 기존 동작 유지
            e.preventDefault();                // 모바일: 이동 대신 펼침/접힘
            item.classList.toggle('is-open');
          });
        });
      });
    })();
  </script>
  <script th:inline="none" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</header>
</body>
</html>
