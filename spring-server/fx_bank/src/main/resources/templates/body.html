<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>body</title>
<link rel="stylesheet" th:href="@{/css/fx-home.css}">

</head>
<body>
<main th:fragment="body" class="fx-main">

  <!-- ===================== HERO ===================== -->
  <section class="hero">
    <span class="hero-blob hero-blob-1"></span>
    <span class="hero-blob hero-blob-2"></span>
    <div class="hero-inner">

      <div class="hero-left" data-stagger="110">
        <span class="hero-badge" data-reveal><span class="live-dot" aria-hidden="true"></span> 실시간 환율 · AI 외환 도우미</span>
        <h1 class="hero-title" data-reveal>
          외환, 더 쉽고<br>
          <span class="hero-accent">똑똑하게</span>
        </h1>
        <p class="hero-desc" data-reveal>
          실시간 고시환율 비교부터 환전 계산, 외화예금까지<br>
          KLS 외환을 한 곳에서 빠르게.
        </p>
        <div class="hero-actions" data-reveal>
          <a th:href="@{/fx/exchange-calculator}" class="btn btn-light press" data-ripple>환전계산기</a>
          <a th:href="@{/fx/exchange-rate}" class="btn btn-ghost press" data-ripple>환율조회</a>
        </div>
      </div>

      <!-- 히어로 featured 환율 카드 (캐러셀, DB 실데이터, JS 렌더) -->
      <aside class="hero-feature" data-reveal="scale">
        <div class="hf-stage" id="heroFeature" aria-live="polite">
          <div class="hf-skeleton">실시간 환율 불러오는 중…</div>
        </div>
        <div class="hf-controls">
          <button type="button" class="hf-nav" id="hfPrev" aria-label="이전 통화">‹</button>
          <div class="hf-dots" id="hfDots"></div>
          <button type="button" class="hf-nav" id="hfNext" aria-label="다음 통화">›</button>
        </div>
      </aside>

    </div>
  </section>

  <!-- ===================== 실시간 환율 ===================== -->
  <section class="section rates-section">
    <div class="section-inner">
      <div class="section-head" data-reveal>
        <div>
          <span class="eyebrow"><span class="live-dot" aria-hidden="true"></span> LIVE RATES</span>
          <h2 class="section-title">실시간 환율</h2>
        </div>
        <a th:href="@{/fx/exchange-rate}" class="section-more">전체 환율 보기 ›</a>
      </div>
      <div class="rate-cards" id="rateCards" data-stagger="70">
        <div class="rate-card-skel">환율 불러오는 중…</div>
      </div>
    </div>
  </section>

  <button type="button" id="chatbot-open" class="chatbot-fab press" data-ripple aria-label="AI 챗봇 상담 열기"><i class="bi bi-chat-dots-fill" aria-hidden="true"></i><span>AI</span></button>
<!-- ===================== AI 배너 ===================== -->
  <section class="section ai-section">
    <div class="section-inner">
      <div class="ai-banner" data-reveal="scale">
        <div class="ai-left">
          <span class="ai-ico"><i class="bi bi-chat-dots" aria-hidden="true"></i></span>
          <div class="ai-text">
            <span class="ai-eyebrow">챗봇 상담</span>
            <h3 class="ai-title">외환 고민, AI에게 바로 물어보세요</h3>
            <p class="ai-sub">RAG 기반 정확한 답변</p>
          </div>
        </div>
        
      </div>
    </div>
  </section>
<!-- ===================== AI 챗봇 위젯 ===================== -->
<div id="chatbot-widget" class="chatbot-widget" style="display:none;">
  <div class="chatbot-header">
    <div class="chatbot-title">
      <span><i class="bi bi-chat-dots" aria-hidden="true"></i></span>
      <span>챗봇 상담</span>
    </div>
    <button id="chatbot-close" class="chatbot-close" aria-label="닫기"><i class="bi bi-x-lg" aria-hidden="true"></i></button>
  </div>

  <div id="chatbot-messages" class="chatbot-messages">
    <div class="msg msg-bot">안녕하세요! 외환 관련 궁금한 점을 물어보세요.</div>
  </div>

  <div class="chatbot-input-area">
    <input type="text" id="chatbot-input" class="chatbot-input" placeholder="궁금한 내용을 입력하세요" />
    <button id="chatbot-send" class="chatbot-send">보내기</button>
  </div>
</div>
  <script th:src="@{/js/fx-home.js}"></script>
</main>
<script>
(function () {
  const widget   = document.getElementById('chatbot-widget');
  const openBtn  = document.getElementById('chatbot-open');   // "챗봇 상담 시작" 버튼
  const closeBtn = document.getElementById('chatbot-close');
  const sendBtn  = document.getElementById('chatbot-send');
  const input    = document.getElementById('chatbot-input');
  const messages = document.getElementById('chatbot-messages');

  // 위젯 열기 / 닫기
  function openChatbot() {
    if (!widget || !input) return;
    widget.style.display = 'flex';
    if (openBtn) openBtn.hidden = true;
    input.focus();
  }

  if (openBtn) {
    openBtn.addEventListener('click', function (e) {
      e.preventDefault();
      openChatbot();
    });
  }

  if (location.hash === '#chatbot') {
    setTimeout(openChatbot, 250);
  }

  closeBtn.addEventListener('click', function () {
    widget.style.display = 'none';
    if (openBtn) openBtn.hidden = false;
  });

  // 메시지 화면에 추가
  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'msg ' + (sender === 'user' ? 'msg-user' : 'msg-bot');
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  // 질문 전송
  async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const loading = addMessage('답변을 준비하고 있어요...', 'bot');

    try {
      const res = await fetch('/chatbot/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question })
      });
      const data = await res.json();
      loading.textContent = data.answer || '답변을 가져오지 못했어요.';
    } catch (err) {
      loading.textContent = '일시적으로 상담 연결이 원활하지 않아요. 잠시 후 다시 시도해주세요.';
    } finally {
      sendBtn.disabled = false;
      messages.scrollTop = messages.scrollHeight;
    }
  }

  sendBtn.addEventListener('click', sendQuestion);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') sendQuestion();
  });
})();
</script>
</body>
</html>
