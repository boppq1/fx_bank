<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 작성 | KLS은행</title>
    <link rel="stylesheet" th:href="@{/css/fx-home.css}">
    <link rel="stylesheet" th:href="@{/css/fx-guide.css}">
    <style>
        /* 리뷰 내용 textarea: 공용 시스템에 textarea 전용 클래스가 없어 guide-input 토큰으로 재스타일 */
        textarea.guide-input { min-height: 180px; resize: vertical; line-height: 1.6; }
        /* error: review-form.html JS 가 #error 에 textContent 를 직접 넣어 오류를 표시 → 클래스명 유지 */
        .error { margin-top: 14px; color: var(--up); font-size: 13.5px; font-weight: 600; }
    </style>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<section class="guide-hero">
    <div class="guide-hero-inner">
        <span class="guide-hero-badge">상품 리뷰</span>
        <h1 class="guide-hero-title">리뷰 작성</h1>
        <p class="guide-hero-desc"><strong th:text="${product.productName}">상품명</strong> · 상품 이용 경험을 다른 고객과 나눠주세요.</p>
    </div>
</section>

<main class="guide-wrap">
    <div class="guide-section">
        <h2 class="guide-section-title">리뷰 작성</h2>

        <form id="reviewForm">
            <div class="guide-field">
                <label class="guide-label" for="rating">평점</label>
                <select id="rating" class="guide-select" required><option value="5">5점</option><option value="4">4점</option><option value="3">3점</option><option value="2">2점</option><option value="1">1점</option></select>
            </div>

            <div class="guide-field">
                <label class="guide-label" for="reviewText">리뷰 내용</label>
                <textarea id="reviewText" class="guide-input" maxlength="1000" required placeholder="상품 이용 경험을 작성해주세요."></textarea>
            </div>

            <div class="guide-actions">
                <a class="btn btn-light" th:href="@{/product/detail/{productNo}(productNo=${product.productNo})}">상품 상세로</a>
                <button type="submit" class="btn btn-primary">등록하기</button>
            </div>
            <div id="error" class="error"></div>
        </form>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script th:inline="javascript">
    const productNo = /*[[${product.productNo}]]*/ 0;
    async function getAccessToken() {
        const token = await window.acquireAccessToken();   // 공용 single-flight (refresh 중복/회전충돌 방지)
        if (!token) { location.href = '/login'; return null; }
        return token;
    }
    document.getElementById('reviewForm').addEventListener('submit', async event => {
        event.preventDefault();
        const token = await getAccessToken();
        if (!token) return;
        const response = await fetch(`/api/products/${productNo}/reviews`, {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, credentials: 'same-origin',
            body: JSON.stringify({ rating: Number(document.getElementById('rating').value), reviewText: document.getElementById('reviewText').value })
        });
        const body = await response.json();
        if (!body.success) { document.getElementById('error').textContent = body.message || '리뷰를 등록하지 못했습니다.'; return; }
        location.href = `/product/detail/${productNo}`;
    });
</script>
</body>
</html>
