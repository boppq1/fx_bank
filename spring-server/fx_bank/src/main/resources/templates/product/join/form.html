<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 가입 - 정보 입력</title>
    <style>
        body { max-width: 760px; margin: 40px auto; color: #202124; font-family: 'Malgun Gothic', Arial, sans-serif; }
        label { display: block; margin-top: 16px; font-weight: 700; }
        input, select { width: 100%; padding: 10px; margin-top: 7px; box-sizing: border-box; border: 1px solid #c7cbd1; }
        .ocr-box { margin-top: 24px; padding: 18px; border: 1px solid #c7cbd1; background: #f7f8fa; }
        .ocr-box h2 { margin: 0; font-size: 18px; }
        .hint, .status, .identity-notice { margin: 8px 0 0; font-size: 14px; color: #666; }
        .status.ok { color: #176b3a; } .status.error { color: #b00020; }
        .actions { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }
        button, a.button { padding: 10px 14px; border: 1px solid #333; background: #111; color: white; text-decoration: none; cursor: pointer; }
        .secondary { background: white; color: #111; }
        button:disabled { cursor: not-allowed; border-color: #bbb; background: #ddd; color: #777; }
        .message { margin-top: 12px; color: #176b3a; } .error { margin-top: 12px; color: #b00020; }
    </style>
</head>
<body>
<h1>상품 가입 - 정보 입력</h1>
<p><strong th:text="${product.productName}">상품명</strong></p>

<form id="joinForm">
    <input type="hidden" id="productNo" th:value="${product.productNo}">

    <section id="ocrSection" class="ocr-box">
        <h2>신분증 OCR 인증</h2>
        <p class="hint">신분증 이미지를 선택하면 FastAPI OCR 서버에서 인식한 뒤 로그인 회원 정보와 대조합니다.</p>
        <label for="idCardFile">신분증 이미지</label>
        <input id="idCardFile" type="file" accept="image/jpeg,image/png,image/webp">
        <div class="actions"><button type="button" id="ocrButton" class="secondary">신분증 인증하기</button></div>
        <p id="ocrStatus" class="status">아직 인증되지 않았습니다.</p>
    </section>
    <p id="identityNotice" class="identity-notice" hidden></p>

    <label for="currencyCode">통화</label>
    <select id="currencyCode" required>
        <option value="">선택</option>
        <option th:each="currency : ${currencies}"
                th:value="${currency.currencyCode}"
                th:text="${currency.currencyCode + ' - ' + currency.currencyName}">USD</option>
    </select>

    <label for="rateNo">가입 기간 / 금리</label>
    <select id="rateNo" required>
        <option value="">선택</option>
        <option th:each="rate : ${rates}"
                th:value="${rate.rateNo}"
                th:attr="data-period=${rate.periodMonth},data-rate=${rate.interestRate}"
                th:text="${rate.periodMonth + '개월 / ' + rate.interestRate + '%'}">12개월 / 4.5%</option>
    </select>

    <label for="amount">가입 금액</label>
    <input id="amount" type="number" min="1" step="1" required placeholder="가입 금액 입력">

    <label for="accountPassword">계좌 비밀번호</label>
    <input id="accountPassword" type="password" required minlength="4" maxlength="20" placeholder="계좌 비밀번호 입력">

    <div class="actions">
        <a class="button secondary" th:href="@{/product/join/{productNo}/terms(productNo=${product.productNo})}">이전</a>
        <button id="submitButton" type="submit">가입 완료</button>
    </div>
    <div id="message" class="message"></div>
    <div id="error" class="error"></div>
</form>

<script>
const tinySignature = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChAI9jU77yQAAAABJRU5ErkJggg==';
let ocrVerified = false;
let identityVerificationRequired = true;

async function ensureAccessToken() {
    if (window.accessToken) return window.accessToken;
    const res = await fetch('/api/auth/refresh', { method: 'POST', credentials: 'same-origin' });
    const body = await res.json();
    if (!body.success || !body.data || !body.data.accessToken) {
        location.href = '/login';
        return null;
    }
    window.accessToken = body.data.accessToken;
    return window.accessToken;
}

async function apiFetch(url, options) {
    const token = await ensureAccessToken();
    if (!token) return null;
    const headers = Object.assign({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, options.headers || {});
    return fetch(url, Object.assign({}, options, { headers, credentials: 'same-origin' }));
}

function setMessage(text) { document.getElementById('message').textContent = text || ''; document.getElementById('error').textContent = ''; }
function setError(text) { document.getElementById('error').textContent = text || ''; document.getElementById('message').textContent = ''; }
function setOcrStatus(text, type) {
    const status = document.getElementById('ocrStatus');
    status.textContent = text;
    status.className = 'status ' + (type || '');
}

async function loadIdentityVerificationRequirement() {
    const token = await ensureAccessToken();
    if (!token) return;
    const productNo = Number(document.getElementById('productNo').value);
    const response = await fetch(`/api/product/join/${productNo}/identity-verification-requirement`, {
        headers: { 'Authorization': 'Bearer ' + token }, credentials: 'same-origin'
    });
    const body = await response.json();
    if (!body.success) { setError(body.message || '본인확인 대상을 조회하지 못했습니다.'); return; }

    const requirement = body.data;
    identityVerificationRequired = requirement.required;
    const notice = document.getElementById('identityNotice');
    if (!requirement.required) {
        document.getElementById('ocrSection').hidden = true;
        notice.hidden = false;
        notice.textContent = requirement.reason;
    } else {
        setOcrStatus(`[${requirement.level}] ${requirement.reason}`, '');
    }
}

document.getElementById('ocrButton').addEventListener('click', async () => {
    const file = document.getElementById('idCardFile').files[0];
    if (!file) { setOcrStatus('신분증 이미지를 선택해주세요.', 'error'); return; }

    const token = await ensureAccessToken();
    if (!token) return;
    const button = document.getElementById('ocrButton');
    button.disabled = true;
    setOcrStatus('신분증을 인식하고 회원 정보와 대조하고 있습니다.', '');

    try {
        const formData = new FormData();
        formData.append('file', file);
        const productNo = Number(document.getElementById('productNo').value);
        const response = await fetch(`/api/product/join/${productNo}/ocr`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData,
            credentials: 'same-origin'
        });
        const body = await response.json();
        if (!body.success) { setOcrStatus(body.message || 'OCR 인증에 실패했습니다.', 'error'); return; }
        ocrVerified = true;
        setOcrStatus('OCR 인증이 완료되었습니다.', 'ok');
    } catch (error) {
        setOcrStatus('OCR 서버 통신 중 오류가 발생했습니다.', 'error');
    } finally {
        button.disabled = false;
    }
});

document.getElementById('joinForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    if (identityVerificationRequired && !ocrVerified) { setError('가입하기 전에 신분증 OCR 인증을 완료해주세요.'); return; }

    const productNo = Number(document.getElementById('productNo').value);
    const rateOption = document.getElementById('rateNo').selectedOptions[0];
    const formPayload = {
        productNo,
        rateNo: Number(rateOption.value),
        currencyCode: document.getElementById('currencyCode').value,
        amount: Number(document.getElementById('amount').value),
        periodMonth: Number(rateOption.dataset.period),
        appliedRate: Number(rateOption.dataset.rate),
        accountPassword: document.getElementById('accountPassword').value
    };

    let response = await apiFetch('/api/product/join/form', { method: 'POST', body: JSON.stringify(formPayload) });
    if (!response) return;
    let body = await response.json();
    if (!body.success) { setError(body.message); return; }

    response = await apiFetch('/api/product/join/complete', {
        method: 'POST', body: JSON.stringify({ productNo, signatureImageData: tinySignature })
    });
    if (!response) return;
    body = await response.json();
    if (!body.success) { setError(body.message); return; }
    location.href = `/product/join/${productNo}/complete?subscriptionNo=${body.data}`;
});

loadIdentityVerificationRequirement();
</script>
</body>
</html>
