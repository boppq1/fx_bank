<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>약관 읽기</title>
    <style>
        body { max-width: 760px; margin: 36px auto; color: #202124; font-family: 'Malgun Gothic', Arial, sans-serif; }
        .header { padding-bottom: 18px; border-bottom: 1px solid #dfe3e8; } .header p { margin: 6px 0 0; color: #69707c; }
        .reader { height: min(62vh, 600px); margin-top: 18px; padding: 20px; overflow-y: auto; border: 1px solid #cfd5dc; background: #fff; }
        .content { margin: 0; white-space: pre-wrap; word-break: break-all; font-size: 14px; line-height: 1.85; }
        .footer { display: flex; gap: 10px; margin-top: 20px; } button, a { padding: 11px 14px; border: 1px solid #222; background: #111; color: #fff; text-decoration: none; cursor: pointer; }
        button:disabled { border-color: #bbb; background: #ddd; color: #777; cursor: not-allowed; } .hint { margin-top: 12px; color: #69707c; font-size: 14px; }
    </style>
</head>
<body>
<header class="header"><h1 th:text="${term.termsTitle}">약관 제목</h1><p>아래 내용을 끝까지 확인한 뒤 동의 여부를 선택할 수 있습니다.</p></header>
<main id="reader" class="reader"><p class="content" th:text="${term.termsText}">약관 내용</p></main>
<p id="hint" class="hint">약관을 끝까지 읽어주세요.</p>
<div class="footer">
    <a th:href="@{/product/join/{productNo}/terms(productNo=${product.productNo})}">이전</a>
    <button id="confirmButton" type="button" disabled>확인했습니다</button>
</div>
<script th:inline="javascript">
    const productNo = /*[[${product.productNo}]]*/ 0;
    const termsCode = /*[[${term.termsCode}]]*/ '';
    const reader = document.getElementById('reader');
    const button = document.getElementById('confirmButton');
    const hint = document.getElementById('hint');
    function canConfirm() { return reader.scrollHeight <= reader.clientHeight || reader.scrollTop + reader.clientHeight >= reader.scrollHeight - 2; }
    function enableConfirm() { button.disabled = false; hint.textContent = '약관을 모두 읽었습니다.'; }
    if (canConfirm()) enableConfirm();
    reader.addEventListener('scroll', () => { if (canConfirm()) enableConfirm(); });
    button.addEventListener('click', () => {
        sessionStorage.setItem(`product-terms-read:${productNo}:${termsCode}`, 'Y');
        location.href = `/product/join/${productNo}/terms`;
    });
</script>
</body>
</html>
