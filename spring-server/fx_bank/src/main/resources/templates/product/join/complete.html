<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 가입 완료</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            line-height: 1.5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f5f5f5;
            width: 180px;
        }

        a.button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 14px;
            border: 1px solid #333;
            background: #111;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
<h1>상품 가입 완료</h1>

<table th:if="${complete != null}">
    <tr>
        <th>가입 번호</th>
        <td th:text="${complete.subscriptionNo}">1</td>
    </tr>
    <tr>
        <th>상품명</th>
        <td th:text="${complete.productName}">상품명</td>
    </tr>
    <tr>
        <th>가입자</th>
        <td th:text="${complete.userName}">가입자</td>
    </tr>
    <tr>
        <th>계좌번호</th>
        <td th:text="${complete.acntNo}">계좌번호</td>
    </tr>
    <tr>
        <th>통화</th>
        <td>
            <span th:switch="${complete.currencyCode}">
                <span th:case="'USD'">미국 달러(USD)</span>
                <span th:case="'JPY'">일본 엔(JPY)</span>
                <span th:case="'EUR'">유로(EUR)</span>
                <span th:case="'CNY'">중국 위안(CNY)</span>
                <span th:case="'GBP'">영국 파운드(GBP)</span>
                <span th:case="*" th:text="${complete.currencyCode}">통화</span>
            </span>
        </td>
    </tr>
    <tr>
        <th>가입 금액</th>
        <td th:text="${#numbers.formatDecimal(complete.amount, 0, 'COMMA', 2, 'POINT')}">0</td>
    </tr>
    <tr>
        <th>가입 기간</th>
        <td th:text="${complete.periodMonth + '개월'}">12개월</td>
    </tr>
    <tr>
        <th>적용 금리</th>
        <td th:text="${complete.appliedRate + '%'}">4.5%</td>
    </tr>
    <tr>
        <th>가입 상태</th>
        <td th:text="${complete.subscriptionStatus}">가입완료</td>
    </tr>
    <tr>
        <th>가입일</th>
        <td th:text="${#dates.format(complete.subscribedDt, 'yyyy-MM-dd')}">2026-06-19</td>
    </tr>
    <tr>
        <th>만기일</th>
        <td th:text="${#dates.format(complete.maturityDt, 'yyyy-MM-dd')}">2027-06-19</td>
    </tr>
</table>

<p th:if="${complete == null}">가입 완료 정보를 찾을 수 없습니다.</p>

<a class="button" th:href="@{/product/detail/{productNo}(productNo=${productNo})}">상품 상세로 돌아가기</a>
</body>
</html>
