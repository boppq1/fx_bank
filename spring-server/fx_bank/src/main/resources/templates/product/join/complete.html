<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 가입 완료 | BNK 부산은행</title>
    <link rel="stylesheet" th:href="@{/css/fx-home.css}">
    <link rel="stylesheet" th:href="@{/css/fx-guide.css}">
    <style>
        .complete-table th { width: 180px; }
    </style>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<section class="guide-hero">
    <div class="guide-hero-inner">
        <span class="guide-hero-badge">상품 가입</span>
        <h1 class="guide-hero-title">상품 가입이 완료되었습니다</h1>
        <p class="guide-hero-desc">가입 내역을 확인하세요. 가입한 상품과 외화 계좌는 마이페이지에서 다시 볼 수 있습니다.</p>
    </div>
</section>

<main class="guide-wrap">
    <div class="guide-section">
        <h2 class="guide-section-title">가입 내역</h2>

        <div th:if="${complete != null}">
            <p class="guide-note">가입이 정상적으로 완료되었습니다.</p>
            <div class="guide-table-wrap">
                <table class="guide-table complete-table">
                    <tbody>
                    <tr>
                        <th>가입 번호</th>
                        <td th:text="${complete.subscriptionNo}">1</td>
                    </tr>
                    <tr>
                        <th>상품명</th>
                        <td th:text="${complete.productName}">상품명</td>
                    </tr>
                    <tr>
                        <th>가입자</th>
                        <td th:text="${complete.userName}">가입자</td>
                    </tr>
                    <tr>
                        <th>계좌번호</th>
                        <td th:text="${complete.acntNo}">계좌번호</td>
                    </tr>
                    <tr>
                        <th>통화</th>
                        <td>
                            <span th:switch="${complete.currencyCode}">
                                <span th:case="'USD'">미국 달러(USD)</span>
                                <span th:case="'JPY'">일본 엔(JPY)</span>
                                <span th:case="'EUR'">유로(EUR)</span>
                                <span th:case="'CNY'">중국 위안(CNY)</span>
                                <span th:case="'GBP'">영국 파운드(GBP)</span>
                                <span th:case="*" th:text="${complete.currencyCode}">통화</span>
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <th>가입 금액</th>
                        <td th:text="${complete.periodMonth == 0 ? '가입 금액 없음 (시작 잔액 0)' : #numbers.formatDecimal(complete.amount, 0, 'COMMA', 2, 'POINT')}">0</td>
                    </tr>
                    <tr>
                        <th>가입 기간</th>
                        <td th:text="${complete.periodMonth == 0 ? '기간 없음' : complete.periodMonth + '개월'}">기간 없음</td>
                    </tr>
                    <tr>
                        <th>적용 금리</th>
                        <td th:text="${complete.appliedRate + '%'}">4.5%</td>
                    </tr>
                    <tr>
                        <th>가입 상태</th>
                        <td th:text="${complete.subscriptionStatus}">가입완료</td>
                    </tr>
                    <tr>
                        <th>가입일</th>
                        <td th:text="${#dates.format(complete.subscribedDt, 'yyyy-MM-dd')}">2026-06-19</td>
                    </tr>
                    <tr>
                        <th>만기일</th>
                        <td th:text="${complete.maturityDt == null ? '해당 없음' : #dates.format(complete.maturityDt, 'yyyy-MM-dd')}">해당 없음</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p th:if="${complete == null}" class="guide-note guide-warn">가입 완료 정보를 찾을 수 없습니다.</p>

        <div class="guide-actions">
            <a class="btn btn-primary" th:href="@{/product/detail/{productNo}(productNo=${productNo})}">상품 상세로 돌아가기</a>
        </div>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

</body>
</html>
