<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 가입 상품 | KLS은행</title>
    <link rel="stylesheet" th:href="@{/css/fx-home.css}">
    <link rel="stylesheet" th:href="@{/css/fx-guide.css}">
    <style>
        /* 상태 메시지: JS 가 classList.add('error') / textContent / hidden 을 직접 토글 → 클래스명(message/error) 유지, 토큰 재스타일 */
        #message.message { margin-top: 14px; color: var(--text-sub); font-size: 13.5px; font-weight: 600; }
        #message.message.error { color: var(--up); }
        /* 리뷰 링크: JS 가 innerHTML 로 .review-link 를 생성하고 hidden 토글 → 클래스명 유지, 토큰 재스타일 */
        .review-link { color: var(--violet); font-weight: 600; text-decoration: none; }
        .review-link:hover { text-decoration: underline; }
        .subscription-card-list { display: none; }
        .subscription-card { border: 1px solid var(--border); border-radius: 18px; background: #fff; box-shadow: var(--shadow-sm); padding: 18px; }
        .subscription-card + .subscription-card { margin-top: 12px; }
        .subscription-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .subscription-card-title { margin: 0; font-size: 16px; font-weight: 900; color: var(--text); line-height: 1.35; }
        .subscription-card-type { display: inline-flex; align-items: center; min-height: 26px; padding: 0 10px; border-radius: 999px; background: #F1EEFF; color: var(--violet); font-size: 12px; font-weight: 800; white-space: nowrap; }
        .subscription-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .subscription-card-item { min-width: 0; }
        .subscription-card-label { display: block; margin-bottom: 4px; color: var(--text-sub); font-size: 11.5px; font-weight: 800; }
        .subscription-card-value { display: block; color: var(--text); font-size: 13.5px; font-weight: 800; word-break: break-all; }
        .subscription-card-actions { display: flex; justify-content: flex-end; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
        @media (max-width: 680px) {
            .guide-table-wrap { display: none; }
            .subscription-card-list:not([hidden]) { display: block; }
            .guide-section { padding-bottom: 96px; }
        }
        @media (max-width: 380px) {
            .subscription-card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<section class="guide-hero">
    <div class="guide-hero-inner">
        <span class="guide-hero-badge">상품</span>
        <h1 class="guide-hero-title">내 가입 상품</h1>
        <p class="guide-hero-desc">현재 로그인한 회원의 상품 가입 정보와 연결된 외화 계좌입니다.</p>
    </div>
</section>

<main class="guide-wrap">
    <div class="guide-section">
        <h2 class="guide-section-title">가입 상품 목록</h2>
        <p><a class="guide-link" href="/product/list">상품 목록으로</a></p>

        <div id="message" class="message">가입 상품을 조회하고 있습니다.</div>

        <div class="guide-table-wrap">
            <table id="subscriptionTable" class="guide-table" hidden>
                <thead>
                <tr><th>상품명</th><th>상품유형</th><th>계좌번호</th><th>통화</th><th>가입금액</th><th>계좌잔액</th><th>가입일</th><th>상태</th><th>리뷰</th></tr>
                </thead>
                <tbody id="subscriptionBody"></tbody>
            </table>
        </div>
        <div id="subscriptionCards" class="subscription-card-list" hidden></div>
    </div>
</main>

<div th:replace="~{footer :: footer}"></div>

<script>
async function ensureAccessToken() {
    const token = await window.acquireAccessToken();   // 공용 single-flight (refresh 중복/회전충돌 방지)
    if (!token) {
        window.redirectToLogin();
        return null;
    }
    return token;
}

function formatAmount(value, currencyCode) {
    if (value === null || value === undefined) return '-';
    return new Intl.NumberFormat('ko-KR').format(value) + ' ' + (currencyCode || '');
}

function formatDate(value) {
    if (!value) return '-';
    return String(value).slice(0, 10).replaceAll('-', '.');
}

function escapeHtml(value) {
    return String(value ?? '-').replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
}

async function loadMySubscriptions() {
    const token = await ensureAccessToken();
    if (!token) return;
    const response = await fetch('/api/product/join/my-subscriptions', {
        headers: { 'Authorization': 'Bearer ' + token },
        credentials: 'same-origin'
    });
    const body = await response.json();
    const message = document.getElementById('message');
    if (!body.success) {
        message.classList.add('error');
        message.textContent = body.message || '가입 상품을 조회하지 못했습니다.';
        return;
    }
    if (!body.data || body.data.length === 0) {
        message.textContent = '가입한 상품이 없습니다.';
        return;
    }

    const tableRows = body.data.map(item => `
        <tr>
            <td>${escapeHtml(item.productName)}</td>
            <td>${escapeHtml(item.productType)}</td>
            <td>${escapeHtml(item.accountNo)}</td>
            <td>${escapeHtml(item.currencyCode)}</td>
            <td>${formatAmount(item.subscriptionAmount, item.currencyCode)}</td>
            <td>${formatAmount(item.accountBalance, item.currencyCode)}</td>
            <td>${formatDate(item.subscribedDt)}</td>
            <td>${escapeHtml(item.subscriptionStatus)}</td>
            <td><a class="review-link" data-product-no="${item.productNo}" href="/product/${item.productNo}/reviews/new" hidden>리뷰 작성</a></td>
        </tr>`).join('');

    const cards = body.data.map(item => `
        <article class="subscription-card">
            <div class="subscription-card-head">
                <h3 class="subscription-card-title">${escapeHtml(item.productName)}</h3>
                <span class="subscription-card-type">${escapeHtml(item.productType)}</span>
            </div>
            <div class="subscription-card-grid">
                <div class="subscription-card-item"><span class="subscription-card-label">계좌번호</span><span class="subscription-card-value">${escapeHtml(item.accountNo)}</span></div>
                <div class="subscription-card-item"><span class="subscription-card-label">통화</span><span class="subscription-card-value">${escapeHtml(item.currencyCode)}</span></div>
                <div class="subscription-card-item"><span class="subscription-card-label">가입금액</span><span class="subscription-card-value">${formatAmount(item.subscriptionAmount, item.currencyCode)}</span></div>
                <div class="subscription-card-item"><span class="subscription-card-label">계좌잔액</span><span class="subscription-card-value">${formatAmount(item.accountBalance, item.currencyCode)}</span></div>
                <div class="subscription-card-item"><span class="subscription-card-label">가입일</span><span class="subscription-card-value">${formatDate(item.subscribedDt)}</span></div>
                <div class="subscription-card-item"><span class="subscription-card-label">상태</span><span class="subscription-card-value">${escapeHtml(item.subscriptionStatus)}</span></div>
            </div>
            <div class="subscription-card-actions"><a class="review-link" data-product-no="${item.productNo}" href="/product/${item.productNo}/reviews/new" hidden>리뷰 작성</a></div>
        </article>`).join('');

    document.getElementById('subscriptionBody').innerHTML = tableRows;
    const cardList = document.getElementById('subscriptionCards');
    if (cardList) {
        cardList.innerHTML = cards;
        cardList.hidden = false;
    }
    message.hidden = true;
    document.getElementById('subscriptionTable').hidden = false;
    await showReviewLinks(token);
}

async function showReviewLinks(token) {
    const links = Array.from(document.querySelectorAll('.review-link'));
    await Promise.all(links.map(async link => {
        const productNo = link.dataset.productNo;
        const response = await fetch(`/api/products/${productNo}/review-eligibility`, {
            headers: { 'Authorization': 'Bearer ' + token }, credentials: 'same-origin'
        });
        const body = await response.json();
        if (body.success && body.data) link.hidden = false;
    }));
}

loadMySubscriptions();
</script>
</body>
</html>
