# ========================================================================
# 파일명: application.properties
# 역할: FX BANK 프로젝트 백엔드 핵심 환경 설정 (Properties 기본 문법 버전)
# 내용: 서버 포트, Oracle DB 연결, Redis 세션, MyBatis 매퍼 및 JWT 설정
# ========================================================================

# 1. 서버 및 서블릿 설정
server.port=8080
server.servlet.context-path=/

# 2. 애플리케이션 식별 이름 정의
spring.application.name=fx_bank

# 3. Oracle Database (JDBC) 설정
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver

# 4. Redis 토큰 및 세션 관리 설정
spring.data.redis.host=localhost
spring.data.redis.port=6379

# 5. MyBatis 매퍼 및 오라클 특화 설정
# - mapper-locations: src/main/resources/mapper 하위의 모든 xml 파일을 매퍼로 인식
# - map-underscore-to-camel-case: DB 컬럼(USER_ID)을 자바 변수(userId)로 자동 변환
# - jdbc-type-for-null: 오라클 특성상 데이터가 NULL로 들어올 때 부적절한 열 유형 에러 방지
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL

logging.level.com.example.bank=DEBUG
logging.level.org.mybatis=DEBUG
# 6. 로그 출력 레벨 설정 (SQL 쿼리 디버깅 및 시큐리티 추적용)
logging.level.com.fxbank=debug
logging.level.org.springframework.security=info

# 7. JWT (Json Web Token) 커스텀 인증 설정
# - secret-key: HS256 알고리즘을 충족하는 32바이트(256비트) 이상의 보안 비밀키
# - access-expiration: 30분 (밀리초: 30 * 60 * 1000)
# - refresh-expiration: 7일 (밀리초: 7 * 24 * 60 * 60 * 1000)
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000

# 8. 주민번호 AES-256 양방향 암호화 키 (EncryptUtil)
# - Base64 로 인코딩된 32바이트(256비트) 키여야 함. 키 값은 절대 커밋하지 말 것.
# - 실제 키는 application-local.properties(시크릿 파일)에 app.crypto.aes-key 로 둔다.
# - 샘플 키 생성: openssl rand -base64 32
app.crypto.aes-key=k7Q2mZ8vR4tX1pL9aN6sD3hF0jU5cB2eW8yG4iO1qP0=

# 9. 신분증 OCR FastAPI(YOLO + CLOVA) 서버 주소
app.ocr.fastapi-url=http://localhost:8003

# 10. 민감정보(주민번호) 보관기한 만료 청소 배치 주기 (기본: 매시간 정각)
app.sensitive.cleanup-cron=0 0 * * * *

# 11. 신분증 이미지 업로드 용량 제한 (멀티파트)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 12. 한국수출입은행 환율 OpenAPI (FX 환율 적재 스케줄러)
# - api-key: 1차 banking_system 에서 사용하던 동일 키 (운영 시 환경변수/시크릿으로 분리 권장)
# - base-url: 환율 조회 OpenAPI(AP01) 엔드포인트
# - cron: 매일 12시(정오) 적재. 한국수출입은행이 오전 11시경 고시하므로 정오에 받아야 당일 실데이터가 들어온다.
#         (당일자 미고시/휴일 시 가장 최근 영업일까지 거슬러 조회)
fx.exim.api-key=Eg9Yl9fEBQhpVXX1eyvo0QhAyHFM0Xiw
fx.exim.base-url=https://oapi.koreaexim.go.kr/site/program/financial/exchangeJSON
fx.exim.cron=0 0 12 * * *

# 13. 메인 페이지 노출 대표 통화 (currency_code 기준, 콤마 구분). 수출입은행 표기상 엔화는 JPY(100)
fx.main.currencies=USD,JPY(100),CNH,EUR
# 13-1. 메인 환율 카드/캐러셀 통화 세트 (대표보다 넓게)
fx.card.currencies=USD,JPY(100),CNH,EUR,GBP,AUD,CAD,CHF

spring.profiles.active=local
