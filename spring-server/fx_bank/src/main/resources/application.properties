# ========================================================================
# 파일명: application.properties
# 역할: FX BANK 프로젝트 백엔드 핵심 환경 설정 (Properties 기본 문법 버전)
# 내용: 서버 포트, Oracle DB 연결, Redis 세션, MyBatis 매퍼 및 JWT 설정
# ========================================================================

# 1. 서버 및 서블릿 설정
server.port=8080
server.servlet.context-path=/

# 2. 애플리케이션 식별 이름 정의
spring.application.name=fx_bank

# 3. Oracle Database (JDBC) 설정
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver

# 4. Redis 토큰 및 세션 관리 설정
spring.data.redis.host=localhost
spring.data.redis.port=6379

# 5. MyBatis 매퍼 및 오라클 특화 설정
# - mapper-locations: src/main/resources/mapper 하위의 모든 xml 파일을 매퍼로 인식
# - map-underscore-to-camel-case: DB 컬럼(USER_ID)을 자바 변수(userId)로 자동 변환
# - jdbc-type-for-null: 오라클 특성상 데이터가 NULL로 들어올 때 부적절한 열 유형 에러 방지
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL

logging.level.com.example.bank=DEBUG
logging.level.org.mybatis=DEBUG
# 6. 로그 출력 레벨 설정 (SQL 쿼리 디버깅 및 시큐리티 추적용)
logging.level.com.fxbank=debug
logging.level.org.springframework.security=info

# 7. JWT (Json Web Token) 커스텀 인증 설정
# - secret-key: HS256 알고리즘을 충족하는 32바이트(256비트) 이상의 보안 비밀키
# - access-expiration: 30분 (밀리초: 30 * 60 * 1000)
# - refresh-expiration: 7일 (밀리초: 7 * 24 * 60 * 60 * 1000)
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000

